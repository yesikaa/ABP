<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise JavaScript & jQuery - Telkom University</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* CSS Embed untuk styling layout [cite: 27, 31] */
        body { background-color: #f4f4f4; padding: 20px; }
        
        .main-container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border: 2px solid #333; /* Implementasi Box Model [cite: 181] */
        }

        .box-logic {
            border: 1px solid #000;
            padding: 15px;
            margin-bottom: 20px;
            transition: 0.3s; /* Efek halus saat warna berubah */
        }

        /* Class untuk manipulasi CSS via JS [cite: 1315, 1317] */
        .bg-custom-color {
            background-color: #ffeb3b !important;
        }

        .result-display {
            font-weight: bold;
            color: #d32f2f;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h2 class="mb-4">Exercise JavaScript</h2>

        <div class="box-logic">
            <h5>1. Kalkulator Jumlah Angka Ganjil</h5>
            <div class="row g-2 align-items-center">
                <div class="col-auto">
                    <input type="number" id="minInput" class="form-control" placeholder="Min (ex: 1)">
                </div>
                <div class="col-auto">
                    <input type="number" id="maxInput" class="form-control" placeholder="Max (ex: 8)">
                </div>
                <div class="col-auto">
                    <button onclick="prosesHitungGanjil()" class="btn btn-dark">Hitung</button>
                </div>
            </div>
            <p class="mt-2">Hasil: <span id="hasilGanjil" class="result-display">0</span></p>
        </div>

        <div id="kotakTarget" class="box-logic">
            <h5 id="teksJudul">2. Manipulasi Box & Teks</h5>
            <p id="teksParagraf">
                Klik tombol di bawah untuk mengubah perataan teks ini atau mengubah warna latar belakang kotak ini.
            </p>
        </div>

        <div class="d-flex gap-2">
            <button onclick="ubahAlignment()" class="btn btn-primary">Ubah Alignment</button>
            <button onclick="ubahWarnaBox()" class="btn btn-success">Ubah Warna Box</button>
        </div>
    </div>

    <script>
        // Fungsi untuk menghitung total angka ganjil [cite: 1096, 1370]
        function prosesHitungGanjil() {
            // Mengambil nilai dari input DOM [cite: 1173, 1182]
            var min = parseInt(document.getElementById("minInput").value);
            var max = parseInt(document.getElementById("maxInput").value);
            var total = 0;

            // Perulangan for loop [cite: 993, 995]
            for (var i = min; i <= max; i++) {
                // Logika pengecekan angka ganjil [cite: 848, 981]
                if (i % 2 !== 0) {
                    total += i;
                }
            }

            // Menampilkan hasil ke elemen HTML [cite: 1174, 1185]
            document.getElementById("hasilGanjil").innerHTML = total;
        }

        // Fungsi mengubah alignment teks (Center/Right) [cite: 1376]
        function ubahAlignment() {
            var elemenTeks = document.getElementById("kotakTarget");
            // Manipulasi style langsung via JS [cite: 1150]
            if (elemenTeks.style.textAlign === "center") {
                elemenTeks.style.textAlign = "right";
            } else {
                elemenTeks.style.textAlign = "center";
            }
        }

        // Fungsi mengubah warna background (Toggle) [cite: 1377, 1378]
        function ubahWarnaBox() {
            var box = document.getElementById("kotakTarget");
            // Memeriksa apakah class sudah ada atau belum [cite: 1321]
            if (box.classList.contains("bg-custom-color")) {
                box.classList.remove("bg-custom-color");
            } else {
                box.classList.add("bg-custom-color");
            }
        }
    </script>

</body>
</html>
