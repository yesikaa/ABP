<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 2 - Variasi Layout Modern</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Embed CSS untuk kustomisasi (Materi hal. 5) */
        body {
            background-color: #f8f9fa;
            padding: 20px;
        }

        /* Implementasi Box Model (Materi hal. 19) */
        .custom-card {
            background: #ffffff;
            border: 2px solid #333; /* Border sesuai materi hal. 20 */
            border-radius: 8px;
            padding: 25px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1); /* Shadow materi hal. 20 */
        }

        .logo-placeholder {
            height: 120px;
            border: 3px dashed #666;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            background: #e9ecef;
        }

        /* Styling baris konten (Main Content) */
        .content-line {
            height: 12px;
            background-color: #dee2e6;
            margin-bottom: 10px;
            border-radius: 20px;
        }

        /* Footer square (Materi hal. 182) */
        .footer-box {
            width: 50px;
            height: 50px;
            background-color: #495057;
        }
    </style>
</head>
<body>

<div class="container custom-card">
    <div class="row mb-4 align-items-start">
        <div class="col-md-4">
            <div class="logo-placeholder">LOGO AREA</div>
        </div>
        <div class="col-md-4 offset-md-4">
            <div class="content-line w-100"></div>
            <div class="content-line w-75 ms-auto"></div>
            <div class="content-line w-100"></div>
            <div class="content-line w-50 ms-auto"></div>
        </div>
    </div>

    <div class="row mb-3">
        <div class="col-12">
            <nav class="navbar navbar-dark bg-dark px-3 rounded">
                <span class="navbar-brand mb-0 h1">Navigasi Utama</span>
            </nav>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="p-3 border rounded">
                <div class="content-line"></div>
                <div class="content-line"></div>
                <div class="content-line"></div>
                <div class="content-line w-75"></div>
                <div class="content-line"></div>
                <div class="content-line w-50"></div>
                <div class="content-line"></div>
                <div class="content-line"></div>
            </div>
        </div>
    </div>

    <hr class="my-4" style="border-top: 2px solid #333;">
    <div class="d-flex justify-content-between align-items-center">
        <div class="footer-box"></div>
        <div class="text-muted small">© 2026 Exercise 2 - School of Computing</div>
        <div class="footer-box"></div>
    </div>
</div>

</body>
</html>
