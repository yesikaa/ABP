<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 2 - Layout Lengkap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Styling dasar untuk visualisasi kotak sesuai materi hal. 181 (Box Model) */
        .outline {
            border: 1px solid #000;
            padding: 10px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fff;
            margin-bottom: 5px;
        }
        .header-box { height: 100px; }
        .side-line { height: 15px; margin-bottom: 5px; width: 100%; border: 1px solid #000; }
        .nav-bar { font-weight: bold; height: 40px; }
        .main-content { min-height: 400px; }
        .thick-line { border-top: 3px solid #000; margin: 10px 0; }
        .footer-square { width: 60px; height: 60px; background-color: #888; border: 1px solid #000; }
    </style>
</head>
<body class="bg-light">

<div class="container bg-white border border-dark my-4 p-4">
    <div class="row align-items-center">
        <div class="col-3">
            <div class="outline header-box">Logo</div>
        </div>
        <div class="col-5 offset-4">
            <div class="side-line"></div>
            <div class="side-line"></div>
            <div class="side-line"></div>
            <div class="side-line"></div>
            <div class="side-line"></div>
        </div>
    </div>

    <div class="thick-line"></div>

    <div class="row">
        <div class="col-12">
            <div class="outline nav-bar">Navigasi</div>
        </div>
    </div>

    <div class="row mt-3">
        <div class="col-12">
            <div class="outline main-content flex-column align-items-stretch">
                <div class="side-line"></div><div class="side-line"></div><div class="side-line"></div>
                <div class="side-line"></div><div class="side-line"></div><div class="side-line"></div>
                <div class="side-line"></div><div class="side-line"></div><div class="side-line"></div>
                <div class="side-line"></div><div class="side-line"></div><div class="side-line"></div>
                <div class="side-line"></div><div class="side-line"></div><div class="side-line"></div>
                <div class="side-line"></div><div class="side-line"></div><div class="side-line"></div>
            </div>
        </div>
    </div>

    <div class="thick-line"></div>

    <div class="row justify-content-between">
        <div class="col-auto">
            <div class="footer-square"></div>
        </div>
        <div class="col-auto">
            <div class="footer-square"></div>
        </div>
    </div>
</div>

</body>
</html>
