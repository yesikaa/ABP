<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Latihan List Properties</title>
    <style>
        
        ul.listsatu {
            background-color: rgb(230, 238, 67); 
            margin: 10px 5px 10px 5px;
            list-style-type: square; 
            list-style-position: inside;
        }

        ol.listdua {
            background-color: lightblue; 
            list-style-type: lower-roman;
            padding: 5px 5px 15px 15px;
            list-style-position: inside;
        }
    </style>
</head>
<body>

    <h3>List of Property</h3>
    <ol type="1">
        <li>Indoor
            <ul class="listsatu">
                <li>Sofa</li>
            </ul>
            <ol class="listdua">
                <li>Tanaman Hias</li>
            </ol>
        </li>
    </ol>

</body>
</html>
