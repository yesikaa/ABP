<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Bootstrap Image - Yesika Widiyani</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* CSS tambahan agar visualisasi lebih rapi saat latihan */
        .demo-box {
            border: 2px dashed #ddd;
            padding: 15px;
            background-color: #f8f9fa;
        }
        .img-label {
            font-size: 0.9rem;
            color: #6c757d;
        }
    </style>
</head>
<body>

<div class="container mt-5 mb-5">
    <h3 class="text-center fw-bold mb-4">Implementasi Bootstrap Image Classes</h3>
    <hr>

    <div class="row">
        <div class="col-md-6 mb-3">
            <div class="demo-box text-center">
                <p class="img-label fw-bold">1. Class .img-thumbnail</p>
                <p class="img-label">Menambahkan border tipis dengan padding di sekeliling gambar, memberikan bingkai yang estetis.</p>
                <img src="rblx.png" class="img-thumbnail" alt="Mancing" style="width: 200px;">
            </div>
        </div>

        <div class="col-md-6 mb-3">
            <div class="demo-box text-center">
                <p class="img-label fw-bold">2. Class .img-fluid</p>
                <p class="img-label">Membuat gambar menjadi responsif, menyesuaikan lebar berdasarkan elemen induknya (container/column).</p>
                <img src="zoya.png" class="img-fluid rounded" alt="Roblox">
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
