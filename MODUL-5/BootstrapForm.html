<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Bootstrap Form - Yesika Widiyani</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 border p-4 shadow-sm rounded">
            <h3 class="text-center mb-4">Formulir Data Diri</h3>
            <hr>
            
            <form>
                <div class="mb-3">
                    <label for="nama" class="form-label">Nama Lengkap</label>
                    <input type="text" class="form-control" id="nama" placeholder="Masukkan nama Anda">
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Alamat Email</label>
                    <input type="email" class="form-control" id="email" placeholder="name@example.com">
                </div>

                <div class="mb-3">
                    <label for="prodi" class="form-label">Program Studi</label>
                    <select class="form-select" id="prodi">
                        <option selected>Pilih Program Studi</option>
                        <option value="S1-IF">S1 Informatika</option>
                        <option value="S1-SI">S1 Sistem Informasi</option>
                        <option value="S1-TE">S1 Teknik Elektro</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="pesan" class="form-label">Pesan/Catatan</label>
                    <textarea class="form-control" id="pesan" rows="3"></textarea>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="setuju">
                    <label class="form-check-label" for="setuju">Saya setuju dengan syarat dan ketentuan</label>
                </div>

                <button type="submit" class="btn btn-primary w-100">Kirim Data</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
