<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramadan Berkah - Yesika Widiyani</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f0fdf4; }
        .hero-section {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1564120282405-f3702170868f?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            height: 100vh;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        #btn-thr { transition: transform 0.3s; }
        #btn-thr:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="container">
            <h1 class="display-3 fw-bold mb-3">Selamat Menunaikan <br> Ibadah Puasa</h1>
            <p class="lead mb-5">Semoga keberkahan Ramadan menyertai kita semua.</p>
            <button id="btn-thr" class="btn btn-warning btn-lg fw-bold px-5 py-3 shadow">
                🎁 KLIK UNTUK KEJUTAN THR!
            </button>
        </div>
    </div>

    <div class="modal fade" id="modalThr" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center border-0 shadow-lg">
                <div class="modal-header bg-success text-white justify-content-center">
                    <h5 class="modal-title">🎉 KEJUTAN BERKAH! 🎉</h5>
                </div>
                <div class="modal-body py-5">
                    <h2 class="text-success fw-bold">Selamat!</h2>
                    <p class="fs-5">Anda mendapatkan paket <strong>THR Spesial Ramadan</strong></p>
                    <div class="display-1">💰</div>
                </div>
                <div class="modal-footer justify-content-center">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Alhamdulillah</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        $(document).ready(function() {
            // Logika jQuery untuk menampilkan Modal saat tombol diklik 
            $("#btn-thr").click(function() {
                var myModal = new bootstrap.Modal(document.getElementById('modalThr'));
                myModal.show();
            });
        });
    </script>
</body>
</html>
