<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Latihan Heading Alignment</title>
    <style>
        h1 {
            text-align: center; /* Mengatur teks ke tengah */
        }
        h2 {
            text-align: left; /* Mengatur teks ke kiri (default) */
        }
        h3 {
            text-align: right; /* Mengatur teks ke kanan */
        }
    </style>
</head>
<body>
    <h1>Heading 1 (center)</h1>
    <h2>Heading 2 (left)</h2>
    <h3>Heading 3 (right)</h3>
</body>
</html>
