<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Bootstrap Button - Yesika Widiyani</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5 mb-5">
    <h3 class="fw-bold mb-4">Implementasi Bootstrap Button</h3>
    <hr>

    <h5 class="mb-3">Variasi Warna (Contextual Classes):</h5>
    <div class="d-flex flex-wrap gap-2 mb-4">
        <button type="button" class="btn btn-primary">Primary</button>
        <button type="button" class="btn btn-secondary">Secondary</button>
        <button type="button" class="btn btn-success">Success</button>
        <button type="button" class="btn btn-danger">Danger</button>
        <button type="button" class="btn btn-warning">Warning</button>
        <button type="button" class="btn btn-info">Info</button>
        <button type="button" class="btn btn-light">Light</button>
        <button type="button" class="btn btn-dark">Dark</button>
        <button type="button" class="btn btn-link">Link</button>
    </div>

    <h5 class="mb-3">Variasi Ukuran (Sizing):</h5>
    <div class="mb-4">
        <button type="button" class="btn btn-primary btn-lg">Large Button (.btn-lg)</button>
        <button type="button" class="btn btn-primary">Normal Button</button>
        <button type="button" class="btn btn-primary btn-sm">Small Button (.btn-sm)</button>
    </div>

    <h5 class="mb-3">Full Width Button:</h5>
    <div class="d-grid gap-2">
        <button class="btn btn-success" type="button">Button Full Width (d-grid)</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
